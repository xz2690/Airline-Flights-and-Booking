<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Flight Search{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f1a;
      --surface: #141928;
      --surface-hover: #1c2236;
      --border: #252d44;
      --text: #e4e8f1;
      --text-muted: #7a84a0;
      --accent: #60a5fa;
      --accent-glow: rgba(96, 165, 250, 0.35);
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* --- Navbar --- */
    nav {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    nav .logo {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    nav .sep { color: var(--border); }
    nav .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .lead {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    /* --- Form elements --- */
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    select, input[type="date"] {
      width: 100%;
      padding: 12px 14px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #0b0f1a;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      appearance: auto;
      transition: border-color 0.2s;
    }
    select option {
      background: #ffffff;
      color: #0b0f1a;
    }
    select:focus, input[type="date"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      background: #2563eb;
      color: #0b0f1a;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-decoration: none;
    }
    .btn:hover { background: #4d59fc; }
    .btn:active { transform: scale(0.97); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { background: var(--surface-hover); }

    /* --- Card / Table --- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      padding: 14px 18px;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    tbody td {
      padding: 14px 18px;
      font-size: 0.92rem;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: var(--surface-hover); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr a {
      color: inherit;
      text-decoration: none;
      display: contents;
    }

    .mono {
      font-family: 'Space Mono', monospace;
      font-size: 0.88rem;
    }

    /* --- Detail Stats --- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px;
    }
    .stat-card .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .stat-card .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-green  { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-amber  { background: rgba(245,158,11,0.15); color: var(--amber); }
    .badge-red    { background: rgba(239,68,68,0.15);  color: var(--red); }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.88rem;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }

    /* --- Seat Grid --- */
    .seat-map {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .seat {
      width: 36px; height: 36px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      font-weight: 700;
    }
    .seat.booked   { background: var(--border); color: var(--text-muted); }
    .seat.available { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }

    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
    }
    .empty-state svg {
      width: 48px; height: 48px;
      stroke: var(--text-muted);
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
